<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Site de Futebol</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #0b6623;
            color: white;
            text-align: center;
        }

        header {
            background-color: #064d1a;
            padding: 20px;
            font-size: 28px;
            font-weight: bold;
        }

        .container {
            padding: 20px;
        }

        img {
            width: 80%;
            max-width: 600px;
            border-radius: 10px;
            margin-top: 20px;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
        }

        p {
            font-size: 18px;
            margin-top: 15px;
        }

        footer {
            background-color: #064d1a;
            padding: 10px;
            position: fixed;
            bottom: 0;
            width: 100%;
        }
    </style>
</head>

<body>

    <header>
        Futebol - Paixão Mundial ⚽
    </header>

    <div class="container">
        <h2>Bem-vindo ao site de futebol</h2>

        <img src="https://images.unsplash.com/photo-1517927033932-b3d18e61fb3a" alt="Imagem de futebol">

        <p>
            O futebol é o esporte mais popular do mundo, reunindo milhões de fãs em todos os continentes.
        </p>
    </div>

    <footer>
        © 2026 - Site de Futebol
    </footer>

</body>
</html>
